name: Update World Bank Haiti Snapshots

on:
  workflow_dispatch:
  schedule:
    - cron: "55 12 * * *"

permissions:
  contents: write

concurrency:
  group: world-bank-haiti-snapshots-main
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24

          package-manager-cache: false

      - name: Generate World Bank Haiti snapshots
        env:
          API_BASE: https://haiti-economie-api.onrender.com
        run: node scripts/update-world-bank-haiti.mjs

      - name: Show output
        run: |
          echo "---- cdn/daily/world-bank-haiti ----"
          ls -la cdn/daily/world-bank-haiti || true
          echo "---- git status ----"
          git status --porcelain || true

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A cdn/daily/world-bank-haiti

          if git diff --cached --quiet; then
            echo "No World Bank Haiti snapshot changes to commit."
            exit 0
          fi

          git commit -m "Update World Bank Haiti snapshots"

          for attempt in 1 2 3; do
            echo "Push attempt $attempt..."

            if git push origin HEAD:main; then
              echo "Push successful."
              exit 0
            fi

            echo "Push rejected. Fetching and rebasing on latest origin/main..."
            git fetch origin main
            git rebase origin/main
          done

          echo "Push failed after 3 attempts."
          exit 1