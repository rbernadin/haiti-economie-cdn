name: Update Core CDN Snapshots

on:
  workflow_dispatch:
  schedule:
    - cron: "55 12 * * *" # daily 12:55 UTC

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate home cards snapshot (core)
        env:
          API_BASE: https://haiti-economie-api.onrender.com
        run: node scripts/generate-home-cards-snapshot.mjs

      - name: Show output
        run: |
          echo "---- cdn/core ----"
          ls -la cdn/core || true
          echo "---- git status ----"
          git status --porcelain || true

      - name: Commit & push if changed
        run: |
          git add -A cdn/core

          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "Update core CDN snapshot"
            git push
          else
            echo "No changes."
          fi