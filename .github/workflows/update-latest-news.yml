name: Update Latest News CDN

on:
  workflow_dispatch:
  schedule:
    # Runs every day at 1:20 PM UTC
    - cron: "20 13 * * *"

permissions:
  contents: write

jobs:
  update-latest-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout CDN repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Update latest news JSON
        env:
          LATEST_NEWS_API_URL: https://haiti-economie-api.onrender.com/api/wp/posts?per_page=12&page=1
        run: node scripts/update-latest-news.mjs

      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add cdn/daily/latest-news.json

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update latest news CDN data"
            git push
          fi